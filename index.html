<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIDLOR Content Radar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #0ea5e9; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .gradient-bg { background: linear-gradient(135deg, #0ea5e9, #2563eb); }
    </style>
</head>
<body class="text-slate-800 pb-12">

    <div class="gradient-bg text-white py-8 px-4 shadow-md mb-8">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-3xl font-semibold mb-2">⚡ TIDLOR Content Radar</h1>
            <p class="text-sky-100 text-sm md:text-base">AI Generator สำหรับ TikTok Script (รองรับ Gen Z & Y พร้อม BOT Compliance)</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto px-4">
        
        <div class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-slate-100">
            <label for="keywordInput" class="block text-sm font-medium text-slate-600 mb-2">ใส่ Keyword ที่ต้องการ (เช่น สินเชื่อรถแลกเงิน, เงินด่วน)</label>
            <div class="flex flex-col md:flex-row gap-3">
                <input type="text" id="keywordInput" placeholder="พิมพ์คีย์เวิร์ดที่นี่..." 
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                <button onclick="generateContent()" id="generateBtn"
                    class="gradient-bg text-white font-medium px-8 py-3 rounded-lg hover:opacity-90 transition shadow-sm whitespace-nowrap flex items-center justify-center min-w-[140px]">
                    สร้างคอนเทนต์
                </button>
            </div>
        </div>

        <div id="loadingIndicator" class="hidden flex-col items-center justify-center py-12">
            <div class="spinner mb-4"></div>
            <p class="text-slate-500 animate-pulse">กำลังวิเคราะห์ข้อมูลและสร้าง Script 4 แบบ... (อาจใช้เวลา 10-20 วินาที)</p>
        </div>

        <div id="errorMessage" class="hidden bg-red-50 text-red-600 p-4 rounded-lg mb-8 border border-red-200 text-center">
            เกิดข้อผิดพลาดในการดึงข้อมูล กรุณาลองใหม่อีกครั้ง
        </div>

        <div id="resultsContainer" class="hidden">
            <h2 class="text-xl font-semibold mb-4 text-slate-700 flex items-center">
                <span class="mr-2">🎯</span> ผลลัพธ์ที่ได้
            </h2>
            <div id="cardsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>

    </div>

    <script>
        // ⚠️ สำคัญมาก: เปลี่ยน URL ตรงนี้เป็น Web App URL ที่ได้จาก Google Apps Script 
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDbWyaABQwzGqJ8hssyGO0KfomxqlGwSlQDrBzVqqewU5Ak-w9RtqhBLjGHqeQYka7/exec";

        async function generateContent() {
            const keyword = document.getElementById('keywordInput').value.trim();
            if (!keyword) {
                alert("กรุณาใส่ Keyword ก่อนครับ");
                return;
            }

            // จัดการ UI State
            document.getElementById('generateBtn').disabled = true;
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('resultsContainer').classList.add('hidden');
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('cardsGrid').innerHTML = '';

            try {
                // เรียก API ไปที่ Google Apps Script
                const response = await fetch(`${SCRIPT_URL}?action=full&keyword=${encodeURIComponent(keyword)}`);
                const result = await response.json();

                if (result.success && result.data && result.data.content) {
                    renderCards(result.data.content);
                    document.getElementById('resultsContainer').classList.remove('hidden');
                } else {
                    throw new Error(result.error || "ไม่พบข้อมูล");
                }
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('errorMessage').innerText = `เกิดข้อผิดพลาด: ${error.message}`;
            } finally {
                // คืนค่า UI State
                document.getElementById('generateBtn').disabled = false;
                document.getElementById('loadingIndicator').classList.add('hidden');
            }
        }

        function renderCards(contentArray) {
            const grid = document.getElementById('cardsGrid');
            
            contentArray.forEach(item => {
                // สี Badge สำหรับแยก Gen และ Type
                const genColor = item.generation.includes("Z") ? "bg-purple-100 text-purple-700" : "bg-teal-100 text-teal-700";
                const typeColor = item.content_type.includes("Commercial") ? "bg-orange-100 text-orange-700" : "bg-blue-100 text-blue-700";
                
                // ดึงข้อมูล Script
                const t = item.tiktok_script || {};
                
                const cardHTML = `
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 hover:shadow-md transition">
                        <div class="flex flex-wrap gap-2 mb-4">
                            <span class="px-3 py-1 text-xs font-semibold rounded-full ${genColor}">${item.generation}</span>
                            <span class="px-3 py-1 text-xs font-semibold rounded-full ${typeColor}">${item.content_type}</span>
                        </div>
                        
                        <div class="mb-4">
                            <p class="text-xs text-slate-500 uppercase tracking-wide font-semibold mb-1">Product</p>
                            <p class="text-sm font-medium text-slate-800">${item.product_used || "-"}</p>
                        </div>

                        <hr class="border-slate-100 mb-4">

                        <div class="space-y-4">
                            <div>
                                <p class="text-xs font-semibold text-rose-500 mb-1">🔥 Hook (3 วิแรก)</p>
                                <p class="text-sm text-slate-700 bg-rose-50 p-2 rounded">${t.hook || "-"}</p>
                            </div>
                            <div>
                                <p class="text-xs font-semibold text-blue-500 mb-1">📝 Body (เนื้อหา)</p>
                                <p class="text-sm text-slate-700 bg-blue-50 p-2 rounded whitespace-pre-line">${t.body || "-"}</p>
                            </div>
                            <div>
                                <p class="text-xs font-semibold text-emerald-500 mb-1">👉 CTA</p>
                                <p class="text-sm text-slate-700 bg-emerald-50 p-2 rounded">${t.cta || "-"}</p>
                            </div>
                            <div>
                                <p class="text-xs font-semibold text-slate-500 mb-1">💬 Caption & BOT Warning</p>
                                <p class="text-xs text-slate-600 border border-slate-200 p-2 rounded bg-slate-50 whitespace-pre-line">${t.caption || "-"}</p>
                            </div>
                            <div>
                                <p class="text-xs text-blue-500">${(t.hashtags || []).join(" ")}</p>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }
    </script>
</body>
</html>
