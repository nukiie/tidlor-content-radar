<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidlor Content Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1f2a;
    --border: #252b38;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --accent3: #7c6aff;
    --text: #e8eaf0;
    --text-dim: #6b7591;
    --font: 'Sarabun', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    padding: 20px;
  }

  .wrap { max-width: 1000px; margin: 0 auto; }

  header {
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 30px;
  }

  h1 { font-size: 24px; margin-bottom: 5px; }
  .subtitle { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: rgba(0, 229, 160, 0.1);
    border: 1px solid rgba(0, 229, 160, 0.3);
    border-radius: 20px;
    margin-top: 10px;
    font-size: 11px;
    color: var(--accent);
    font-family: var(--mono);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .config-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .form-group { margin-bottom: 15px; }
  label {
    display: block;
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    font-weight: 600;
  }

  input, select {
    width: 100%;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
  }

  input:focus, select:focus { border-color: var(--accent); }

  button {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-right: 10px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0a0c10;
  }

  .btn-primary:hover { background: #00ffb3; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
  }

  .btn-secondary:hover { border-color: var(--accent3); color: var(--accent3); }

  .status {
    padding: 12px;
    border-radius: 8px;
    margin-top: 15px;
    font-size: 11px;
    display: none;
    font-family: var(--mono);
  }

  .status.show { display: block; }
  .status.success { background: rgba(0,229,160,0.1); border: 1px solid rgba(0,229,160,0.3); color: var(--accent); }
  .status.error { background: rgba(255,59,48,0.1); border: 1px solid rgba(255,59,48,0.3); color: #ff8080; }
  .status.loading { background: rgba(124,106,255,0.1); border: 1px solid rgba(124,106,255,0.3); color: var(--accent3); }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 15px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent2);
  }

  .card-title {
    font-size: 11px;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-family: var(--mono);
  }

  .card-content {
    font-size: 12px;
    color: var(--text-mid);
    line-height: 1.5;
  }

  .info-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 11px;
    margin-top: 20px;
  }

  .info-box strong { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>⚙️ Tidlor Content Radar</h1>
    <p class="subtitle">🔗 Auto-connected to Google Apps Script</p>
    <div class="status-badge">
      <div class="status-dot"></div>
      <span>Connected</span>
    </div>
  </header>

  <!-- ================== SEARCH SECTION ================== -->
  <div class="config-section">
    <h2 style="font-size: 16px; margin-bottom: 15px;">🔍 Search & Analyze</h2>

    <div class="form-group">
      <label>Keyword</label>
      <input 
        type="text" 
        id="keyword" 
        placeholder="เช่น สินเชื่อทะเบียนรถ"
        value="สินเชื่อทะเบียนรถ"
      >
    </div>

    <div class="form-group">
      <label>Audience</label>
      <select id="audience">
        <option value="gen_z">Gen Z</option>
        <option value="gen_y">Gen Y</option>
      </select>
    </div>

    <div style="display: flex; gap: 10px;">
      <button class="btn-primary" id="runBtn" onclick="runAnalysis()">
        ▶ Run Analysis
      </button>
      <button class="btn-secondary" onclick="saveToSheet()">
        💾 Save to Sheet
      </button>
    </div>

    <div class="status" id="statusAnalysis"></div>
  </div>

  <!-- ================== RESULTS SECTION ================== -->
  <div id="resultsSection" style="display: none;">
    <h2 style="font-size: 16px; margin-bottom: 15px;">📊 Results</h2>
    <div class="cards-grid" id="resultsGrid"></div>
  </div>

</div>

<!-- ================== SCRIPTS ================== -->
<script>
  // ==================== HARDCODED APPS SCRIPT URL ====================
  // ⚠️ REPLACE THIS WITH YOUR APPS SCRIPT WEB APP URL
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyV18zM0NNa4hls8gOFaRSgJIQSFZY341FeWZJ75qY1BaCYJz6Nk7-E8RnQeprOvLLK/exec";

  // Auto-connect on startup
  window.onload = function() {
    console.log("System connected to: " + APPS_SCRIPT_URL);
  };

  // Run analysis
  function runAnalysis() {
    const keyword = document.getElementById('keyword').value.trim();
    const audience = document.getElementById('audience').value;
    const btn = document.getElementById('runBtn');

    if (!keyword) {
      showStatus('⚠️ Please enter a keyword', 'error', 'statusAnalysis');
      return;
    }

    btn.disabled = true;
    showStatus('🔍 Analyzing keyword...', 'loading', 'statusAnalysis');

    callAppsScript('full', keyword, audience, function(response) {
      btn.disabled = false;
      if (response.success) {
        displayResults(response.data);
        showStatus('✓ Analysis complete', 'success', 'statusAnalysis');
      } else {
        showStatus('✗ Error: ' + (response.error || 'Unknown error'), 'error', 'statusAnalysis');
      }
    });
  }

  // Save to sheet
  function saveToSheet() {
    const keyword = document.getElementById('keyword').value.trim();

    if (!keyword) {
      showStatus('⚠️ Please enter a keyword', 'error', 'statusAnalysis');
      return;
    }

    showStatus('💾 Saving to Sheet...', 'loading', 'statusAnalysis');

    callAppsScript('save', keyword, '', function(response) {
      if (response.success) {
        showStatus('✓ Saved to Google Sheet', 'success', 'statusAnalysis');
      } else {
        showStatus('✗ Error: ' + (response.error || 'Unknown error'), 'error', 'statusAnalysis');
      }
    });
  }

  // Call Apps Script via JSONP
  function callAppsScript(action, keyword, audience, callback) {
    const callbackName = 'callback_' + Date.now();
    
    window[callbackName] = function(response) {
      delete window[callbackName];
      try { document.body.removeChild(script); } catch(e) {}
      clearTimeout(timeout);
      callback(response);
    };

    const params = `?action=${action}&keyword=${encodeURIComponent(keyword)}&audience=${audience}&callback=${callbackName}`;
    const script = document.createElement('script');
    script.src = APPS_SCRIPT_URL + params;
    script.onerror = function() {
      showStatus('✗ Connection failed - check Apps Script URL in code', 'error', 'statusAnalysis');
      delete window[callbackName];
      try { document.body.removeChild(script); } catch(e) {}
      clearTimeout(timeout);
    };

    const timeout = setTimeout(function() {
      if (window[callbackName]) {
        showStatus('✗ Request timeout', 'error', 'statusAnalysis');
        delete window[callbackName];
        try { document.body.removeChild(script); } catch(e) {}
      }
    }, 30000);

    document.body.appendChild(script);
  }

  // Display results
  function displayResults(data) {
    const grid = document.getElementById('resultsGrid');
    grid.innerHTML = '';

    const research = data.research || {};
    const content = data.content || {};

    // PAA Card
    if (research.peopleAlsoAsk && research.peopleAlsoAsk.length > 0) {
      grid.innerHTML += createCard(
        '💬 PAA Questions',
        research.peopleAlsoAsk.slice(0, 5).map(q => '• ' + q).join('\n')
      );
    }

    // SERP Card
    if (research.topResults && research.topResults.length > 0) {
      grid.innerHTML += createCard(
        '📈 Top SERP',
        research.topResults.slice(0, 3).map(r => '• ' + r.title).join('\n')
      );
    }

    // Pain Points Card
    if (content.pain_points && content.pain_points.length > 0) {
      grid.innerHTML += createCard(
        '⚡ Pain Points',
        content.pain_points.slice(0, 5).map(p => '• ' + p).join('\n')
      );
    }

    // Intent Card
    grid.innerHTML += createCard(
      '🎯 Search Intent',
      'Intent: ' + (content.search_intent || 'N/A') + '\n\nAngle: ' + (content.content_angle || 'N/A')
    );

    // AEO Card
    if (content.aeo_answers && content.aeo_answers.length > 0) {
      const aeoText = content.aeo_answers.slice(0, 2).map(a => 
        'Q: ' + a.question + '\n\nA: ' + a.answer.substring(0, 60) + '...'
      ).join('\n\n');
      grid.innerHTML += createCard('🤖 AEO Answers', aeoText);
    }

    // Ideas Card
    if (data.ideas && data.ideas.length > 0) {
      const ideasText = data.ideas.slice(0, 3).map(i => 
        '• ' + i.title + ' (' + i.type + ')'
      ).join('\n');
      grid.innerHTML += createCard('💡 Top Ideas', ideasText);
    }

    document.getElementById('resultsSection').style.display = 'block';
    window.scrollTo(0, document.getElementById('resultsSection').offsetTop - 100);
  }

  function createCard(title, content) {
    return `
      <div class="card">
        <div class="card-title">${title}</div>
        <div class="card-content" style="white-space: pre-line;">${content}</div>
      </div>
    `;
  }

  function showStatus(msg, type, elementId) {
    const el = document.getElementById(elementId || 'statusAnalysis');
    el.textContent = msg;
    el.className = 'status show ' + type;
  }
</script>
</body>
</html>
